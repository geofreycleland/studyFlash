<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StudyFlash Pro — Data Mining Exam Prep</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Geist+Mono:wght@300;400;500&family=Geist:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#080a0e;--bg1:#0e1117;--bg2:#141720;--bg3:#1a1e2a;--line:rgba(255,255,255,0.06);--line2:rgba(255,255,255,0.10);--text:#e2e4eb;--text2:#8b90a0;--text3:#555a6a;--gold:#c9a84c;--gold2:#e8c87a;--blue:#f97316;--blue2:#fb923c;--green:#3ecf72;--red:#f06a6a;--r:12px;--r2:16px}
body{background:var(--bg);color:var(--text);font-family:'Geist',sans-serif;font-size:14px;line-height:1.6;overflow-x:hidden}
.app{display:flex;flex-direction:column;min-height:100vh}
.sidebar{background:var(--bg1);border-bottom:1px solid var(--line);padding:20px;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:100}
.logo-text{font-family:'Instrument Serif',serif;font-size:22px;color:#fff}
.logo-badge{font-size:10px;color:var(--blue);background:rgba(249,115,22,0.1);padding:2px 8px;border-radius:4px;margin-left:8px}
.main{flex:1;padding:20px;max-width:800px;margin:0 auto;width:100%}
.screen{display:none}
.screen.active{display:block}
h1{font-family:'Instrument Serif',serif;font-size:32px;margin-bottom:10px;color:var(--gold2)}
.chapter-card{background:var(--bg1);border:1px solid var(--line);border-radius:var(--r);padding:20px;margin-bottom:20px;cursor:pointer;transition:0.2s}
.chapter-card:hover{border-color:var(--blue)}
.chapter-card h3{color:var(--blue);margin-bottom:8px}
.quiz-container{background:var(--bg2);border-radius:var(--r2);padding:24px;border:1px solid var(--line2)}
.q-text{font-size:18px;font-weight:500;margin-bottom:20px}
.options-grid{display:grid;gap:12px}
.opt-btn{background:var(--bg3);border:1px solid var(--line2);padding:15px;border-radius:var(--r);color:var(--text);text-align:left;cursor:pointer;transition:0.2s;width:100%}
.opt-btn:hover{background:var(--line2)}
.opt-btn.correct{border-color:var(--green);background:rgba(62,207,114,0.1)}
.opt-btn.wrong{border-color:var(--red);background:rgba(240,106,106,0.1)}
.progress-bar{height:6px;background:var(--bg3);border-radius:3px;margin-bottom:20px;overflow:hidden}
.progress-fill{height:100%;background:var(--blue);width:0%;transition:0.3s}
.btn-nav{background:var(--blue);color:white;border:none;padding:12px 24px;border-radius:var(--r);font-weight:600;margin-top:20px;cursor:pointer}
</style>
</head>
<body>

<div class="app">
    <div class="sidebar">
        <div class="logo"><span class="logo-text">StudyFlash <span class="logo-badge">PRO</span></span></div>
        <button class="btn-nav" onclick="showScreen('home')" style="margin-top:0; padding:6px 12px">Home</button>
    </div>

    <div class="main">
        <div id="home" class="screen active">
            <h1>Study Dashboard</h1>
            <p style="color:var(--text2); margin-bottom:30px;">Select a chapter to begin your review.</p>
            <div class="chapter-card" onclick="startQuiz()">
                <h3>Chapter 5: Predictive Analytics I</h3>
                <p>Data Mining Process, Methods, and Algorithms. Focuses on classification, types of data, and standard methodologies.</p>
            </div>
        </div>

        <div id="quiz" class="screen">
            <div class="progress-bar"><div id="progress" class="progress-fill"></div></div>
            <div id="quiz-content" class="quiz-container"></div>
        </div>

        <div id="results" class="screen">
            <h1>Quiz Complete!</h1>
            <div class="quiz-container" style="text-align:center">
                <div id="score-display" style="font-size:48px; color:var(--gold); margin-bottom:10px">0%</div>
                <p id="score-text">You answered 0 out of 50 questions correctly.</p>
                <button class="btn-nav" onclick="showScreen('home')">Back to Dashboard</button>
            </div>
        </div>
    </div>
</div>

<script>
const quizData = [
    { q: "Which of the following are types of patterns identified by data mining?", a: ["Associations, Predictions, Clusters, and Sequential Relationships", "Storage, Encryption, Retrieval, and Sorting", "Marketing, Finance, HR, and Sales", "Hardware, Software, Users, and Data"], c: 0 },
    { q: "What is the primary difference between Prediction and Forecasting?", a: ["They are identical in all fields", "Prediction is experience/opinion based; Forecasting is data/model based", "Forecasting is for weather only", "Prediction uses bigger data sets"], c: 1 },
    { q: "Which type of prediction task is used when the predicted item is a class label (e.g., 'rainy' vs 'sunny')?", a: ["Regression", "Clustering", "Classification", "Association"], c: 2 },
    { q: "Which type of prediction task is used when the predicted item is a real number (e.g., '65.5 degrees')?", a: ["Classification", "Regression", "Sequential Discovery", "Clustering"], c: 1 },
    { q: "What are the four main steps of data preprocessing?", a: ["Gathering, Sorting, Deleting, Archiving", "Consolidation, Cleaning, Transformation, and Reduction", "Input, Process, Output, Storage", "Design, Build, Test, Deploy"], c: 1 },
    { q: "Which step of CRISP-DM involves identifying noise and handling missing values?", a: ["Business Understanding", "Data Preparation (Data Cleaning)", "Deployment", "Modeling"], c: 1 },
    { q: "What are the two major types of learning algorithms in data mining?", a: ["Hard and Soft learning", "Supervised and Unsupervised learning", "Fast and Slow learning", "Linear and Non-linear learning"], c: 1 },
    { q: "Which algorithm category uses training data that includes only descriptive attributes without class labels?", a: ["Supervised Learning", "Unsupervised Learning", "Reinforcement Learning", "Deep Learning"], c: 1 },
    { q: "Which of the following is an example of an association rule algorithm?", a: ["Apriori", "K-means", "Logistic Regression", "C4.5"], c: 0 },
    { q: "What is the 'Gini Index' used to measure in a decision tree?", a: ["The speed of the algorithm", "The purity of a sample", "The size of the data set", "The number of users"], c: 1 },
    { q: "What are the three main standardized processes for data mining?", a: ["CRISP-DM, SEMMA, and KDD", "Waterfall, Agile, and Scrum", "ISO 9000, Six Sigma, and Lean", "HTTP, FTP, and SMTP"], c: 0 },
    { q: "In the CRISP-DM process, what is the very first step?", a: ["Data Understanding", "Modeling", "Business Understanding", "Evaluation"], c: 2 },
    { q: "Which methodology stands for 'Sample, Explore, Modify, Model, and Assess'?", a: ["KDD", "SEMMA", "CRISP-DM", "Six Sigma"], c: 1 },
    { q: "What is 'Market-Basket Analysis' also known as?", a: ["Clustering", "Association Rule Mining", "Regression", "Data Cleaning"], c: 1 },
    { q: "Which type of pattern discovers time-ordered events?", a: ["Clustering", "Sequential Relationships", "Simple Regression", "Market-Basket Analysis"], c: 1 },
    { q: "What are the two most common clustering algorithms?", a: ["Apriori and Eclat", "K-means and Self-Organizing Maps", "Linear and Logistic Regression", "ID3 and C4.5"], c: 1 },
    { q: "What are the two most popular ways to determine branching in a decision tree?", a: ["Mean and Median", "Gini Index and Information Gain (Entropy)", "Support and Confidence", "Linear and Logistics"], c: 1 },
    { q: "What is a 'Leaf Node' in a decision tree?", a: ["The root of the tree", "The test on an attribute", "The final class choice for a pattern", "A missing data point"], c: 2 },
    { q: "What are the two main types of predictive policing mentioned in the chapter?", a: ["Blue and Red policing", "Place-based and Person-based", "Urban and Rural", "Manual and Automated"], c: 1 },
    { q: "What does 'AUC' stand for in classification assessment?", a: ["Average User Count", "Area Under the ROC Curve", "Attribute Unit Change", "Automated Universal Class"], c: 1 },
    { q: "Which type of data uses discrete values like 'Male/Female' or 'High/Low'?", a: ["Continuous", "Categorical (Nominal/Ordinal)", "Ratio", "Interval"], c: 1 },
    { q: "What is the 'nontrivial' characteristic of data mining?", a: ["It is very easy", "It involves experimentation-type search or inference", "It requires no computers", "It only uses simple math"], c: 1 },
    { q: "What does 'Novel' mean in the context of data mining patterns?", a: ["They are written in a book", "They were not previously known to the user", "They are very long", "They are fictional"], c: 1 },
    { q: "What is the 'Simple Split' method used for?", a: ["Dividing data into training and testing sets", "Splitting a server", "Dividing profits", "Deleting half the data"], c: 0 },
    { q: "Which step in data preprocessing removes outliers and handles missing values?", a: ["Data Consolidation", "Data Cleaning", "Data Reduction", "Data Transformation"], c: 1 },
    { q: "What is 'Data Reduction' in the preprocessing phase?", a: ["Deleting the entire database", "Reducing data volume without sacrificing integrity", "Compressing files into a ZIP", "Hiring fewer data scientists"], c: 1 },
    { q: "What are the two main types of regression used in statistics for classification?", a: ["ID3 and C4.5", "Logistic Regression and Discriminant Analysis", "Apriori and FP-Growth", "K-means and SOM"], c: 1 },
    { q: "Which of the following is a common classification algorithm?", a: ["K-means", "C4.5", "Apriori", "Expectation Maximization"], c: 1 },
    { q: "What are the three broad categories of data mining tasks?", a: ["Gathering, Sorting, Archiving", "Prediction, Association, and Clustering", "Input, Process, Output", "Design, Coding, Testing"], c: 1 },
    { q: "What is the 'valid' characteristic of data mining patterns?", a: ["They are from a trusted source", "They hold true on new data with certainty", "They are legally binding", "They are formatted correctly"], c: 1 },
    { q: "Which process uses 'Target Data', 'Preprocessed Data', and 'Transformed Data' phases?", a: ["CRISP-DM", "KDD", "SEMMA", "Agile"], c: 1 },
    { q: "Which data mining task partitions records into natural segments without predefined labels?", a: ["Classification", "Clustering", "Regression", "Association"], c: 1 },
    { q: "What are the two measures used to evaluate association rules?", a: ["Mean and Standard Deviation", "Support and Confidence", "Accuracy and Sensitivity", "Profit and Loss"], c: 1 },
    { q: "Which algorithm is a bottom-up approach for identifying frequent itemsets?", a: ["K-means", "Apriori", "ID3", "Neural Networks"], c: 1 },
    { q: "What is the 'novelty' of a pattern?", a: ["It is new to the user", "It is based on a story", "It is very complex", "It is very simple"], c: 0 },
    { q: "Which step of CRISP-DM accounts for the most time (often 80%)?", a: ["Modeling", "Data Understanding & Preparation", "Deployment", "Evaluation"], c: 1 },
    { q: "What is 'Data Transformation' in preprocessing?", a: ["Moving data to a new server", "Normalizing or discretizing data", "Deleting old data", "Printing reports"], c: 1 },
    { q: "Which classification assessment uses 'k' subsets of data for training and testing?", a: ["Simple Split", "k-fold Cross-Validation", "Bootstrapping", "Gini Index"], c: 1 },
    { q: "What is the 'purity' of a sample in a decision tree?", a: ["How clean the data is", "How much the sample belongs to a single class", "The speed of the branch", "The number of missing values"], c: 1 },
    { q: "Which of these is a machine-learning technique for classification?", a: ["Logistic Regression", "Decision Tree Analysis", "Discriminant Analysis", "Mean Analysis"], c: 1 },
    { q: "What is the 'Novelty' of a pattern in data mining?", a: ["It's fictional", "It was previously unknown in that context", "It's published in a journal", "It's very long"], c: 1 },
    { q: "Which type of pattern identifies 'Diapers and Beer' co-occurrence?", a: ["Clustering", "Associations", "Regression", "Sequential Relationships"], c: 1 },
    { q: "What is 'Knowledge Discovery in Databases'?", a: ["KDD", "SQL", "CRM", "ERP"], c: 0 },
    { q: "Which discipline is NOT at the intersection of Data Mining?", a: ["Statistics", "Artificial Intelligence", "Anthropology", "Machine Learning"], c: 2 },
    { q: "What does 'Ultimately Understandable' mean for a pattern?", a: ["It is written in English", "It makes business sense", "It is very simple math", "It can be read by a computer"], c: 1 },
    { q: "What is 'Soft Data'?", a: ["Easy data", "Unstructured text (e.g., emails, notes)", "Data that is not important", "Binary data"], c: 1 },
    { q: "Which metric measures the likelihood of two items being bought together?", a: ["Accuracy", "Confidence", "Precision", "Recall"], c: 1 },
    { q: "What is a 'misnomer' about the term Data Mining?", a: ["It doesn't involve data", "It should be called 'Knowledge Mining'", "It is illegal", "It is only for miners"], c: 1 },
    { q: "Which assessment method is used when the data set is very small?", a: ["Simple Split", "Bootstrapping", "k-fold Cross-Validation", "Gini Index"], c: 1 },
    { q: "What is the final step in the CRISP-DM process?", a: ["Evaluation", "Deployment", "Modeling", "Preparation"], c: 1 }
];

let currentQ = 0;
let score = 0;

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function startQuiz() {
    currentQ = 0;
    score = 0;
    showScreen('quiz');
    renderQuestion();
}

function renderQuestion() {
    const data = quizData[currentQ];
    const progress = (currentQ / quizData.length) * 100;
    document.getElementById('progress').style.width = progress + '%';

    let html = `<div class="q-text">${currentQ + 1}. ${data.q}</div><div class="options-grid">`;
    data.a.forEach((opt, i) => {
        html += `<button class="opt-btn" onclick="checkAnswer(${i})">${opt}</button>`;
    });
    html += `</div>`;
    document.getElementById('quiz-content').innerHTML = html;
}

function checkAnswer(idx) {
    const correct = quizData[currentQ].c;
    const buttons = document.querySelectorAll('.opt-btn');
    
    if(idx === correct) {
        buttons[idx].classList.add('correct');
        score++;
    } else {
        buttons[idx].classList.add('wrong');
        buttons[correct].classList.add('correct');
    }

    setTimeout(() => {
        currentQ++;
        if(currentQ < quizData.length) {
            renderQuestion();
        } else {
            finishQuiz();
        }
    }, 1200);
}

function finishQuiz() {
    showScreen('results');
    const percent = Math.round((score / quizData.length) * 100);
    document.getElementById('score-display').textContent = percent + '%';
    document.getElementById('score-text').textContent = `You answered ${score} out of ${quizData.length} questions correctly.`;
}
</script>
</body>
</html>
